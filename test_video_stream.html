<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Orbitx GIF Test</title>

	<style>
		:root { color-scheme: dark light; }

		body {
			margin: 0;
			min-height: 100vh;
			display: grid;
			place-items: center;
			background: #0b0e11;
			font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu,
				"Helvetica Neue", Arial, "Noto Sans";
			color: #e5e7eb;
		}

		.wrap {
			width: min(960px, 95vw);
		}

		.gif-video {
			width: 100%;
			border-radius: 10px;
			box-shadow: 0 10px 28px rgba(0,0,0,0.45);
			background: #111827;
			display: block;
		}

		.hint {
			margin-top: 8px;
			font-size: 14px;
			color: #9ca3af;
			text-align: center;
		}
	</style>
</head>

<body>
	<div class="wrap">
		<img
			class="gif-video"
			src="http://127.0.0.1:8000/media/videos/2759484-uhd_3840_2160_30fps.gif"
			alt="Animated GIF"
		/>

		<div class="hint">
			GIF playback (HTML-only). No video controls available.
		</div>
	</div>
</body>
</html>
